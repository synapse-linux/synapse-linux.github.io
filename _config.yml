title: "Synapse Linux"
description: "Synapse Linux — An Arch Linux distribution with AMD Strix Halo AI support"
url: "https://synapse-linux.github.io"
baseurl: ""
repository: "synapse-linux/synapse-linux.github.io"

# Build settings
markdown: kramdown
permalink: pretty

# GitHub Pages settings
github_metadata: true

# Cache-busting version (auto-updates on each build)
version: "{{ site.time | date: '%s' }}"

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: "Synapse Team"
  - scope:
      path: ""
      type: pages
    values:
      layout: page

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - package.json
