<footer class="site-footer">
  <div class="footer-inner">
    <p class="copyright">
      &copy; {{ site.time | date: '%Y' }} <a href="{{ '/' | relative_url }}">{{ site.title }}</a>.
      Made with <span class="heart">♥</span> and <a href="https://jekyllrb.com" target="_blank" rel="noopener">Jekyll</a>.
    </p>
    <nav class="footer-nav">
      {%- assign lang = page.lang | default: 'en' -%}
      <a href="https://github.com/synapse-linux" target="_blank" rel="noopener">GitHub</a>
      <a href="https://cachyos.org" target="_blank" rel="noopener">CachyOS</a>
      {%- if lang == 'it' -%}
        <a href="{{ '/it/about/' | relative_url }}">Info</a>
        <a href="{{ '/it/blog/' | relative_url }}">Blog</a>
      {%- else -%}
        <a href="{{ '/en/about/' | relative_url }}">About</a>
        <a href="{{ '/en/blog/' | relative_url }}">Blog</a>
      {%- endif -%}
    </nav>
  </div>
</footer>
